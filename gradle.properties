# Kotlin/Native's compiler-cache builder crashes on androidx.compose.foundation 1.7.0's
# TransferableContent.kt ($stable property codegen) during framework linking
# (linkDebugFrameworkIosArm64) with a ClassCastException deep in IrToBitcode -- a compiler bug,
# not our code (plain compileKotlinIosArm64, which doesn't build this cache, compiles fine).
# The compiler's own error output suggests this workaround.
kotlin.native.cacheKind=none

