name: iOS build check

# Minimal proof-of-life for the Kotlin Multiplatform migration: this only builds the
# :shared module's Kotlin/Native iOS targets (no app UI yet — that's Phase 5+ of the
# migration). It exists because iOS targets are hard-disabled on any non-macOS host
# (see the "Disabled Kotlin/Native Targets" warning on Windows/Linux), so this is the
# first point in the project where iOS compilation gets checked at all.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build-shared-ios-targets:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Windows doesn't preserve the Unix executable bit, and this repo was authored on Windows.
      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compile :shared for all iOS targets
        run: |
          ./gradlew \
            :shared:compileKotlinIosArm64 \
            :shared:compileKotlinIosSimulatorArm64 \
            :shared:compileKotlinIosX64 \
            --stacktrace

      # Phase 6: also link+assemble the XCFramework (a different task class than plain
      # compilation -- exercises framework export config, MainViewController's exposed entry
      # point, and Koin/Room/BackgroundTasks iOS wiring end to end, ahead of a real Xcode project.
      - name: Assemble Shared.xcframework
        run: ./gradlew :shared:assembleSharedDebugXCFramework --stacktrace

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: cd iosApp && xcodegen generate

      # No Apple Developer account/signing identity exists yet (Phase 7) -- Simulator builds
      # don't need one, hence CODE_SIGNING_ALLOWED=NO. -derivedDataPath is fixed (not the default
      # hashed DerivedData location) so the next step can find the built .app deterministically.
      - name: Build iOS app for Simulator
        run: |
          cd iosApp
          xcodebuild -project iosApp.xcodeproj -scheme iosApp \
            -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      # Proves the app actually launches and stays alive in Simulator, not just that it builds.
      - name: Launch smoke test in Simulator
        run: |
          set -euo pipefail
          APP_PATH="iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app"
          BUNDLE_ID="com.shoppilist.ios"

          UDID=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE '[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}')
          echo "Using simulator $UDID"

          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

          xcrun simctl install "$UDID" "$APP_PATH"
          LAUNCH_OUTPUT=$(xcrun simctl launch "$UDID" "$BUNDLE_ID")
          echo "$LAUNCH_OUTPUT"
          APP_PID=$(echo "$LAUNCH_OUTPUT" | grep -oE '[0-9]+$')
          echo "App PID: $APP_PID"

          sleep 5

          xcrun simctl io "$UDID" screenshot launch-screenshot.png || true

          # Simulator apps run as real macOS processes on the host -- checking the PID directly
          # is more reliable than `launchctl list` (which doesn't reflect RunningBoard-managed
          # foreground app processes on modern iOS Simulator runtimes).
          if kill -0 "$APP_PID" 2>/dev/null; then
            echo "App is still running (PID $APP_PID) 5s after launch -- smoke test passed."
          else
            echo "App (PID $APP_PID) is NOT running 5s after launch -- it crashed or exited."
            echo "--- Recent unified log for the app process ---"
            xcrun simctl spawn "$UDID" log show --last 2m --predicate 'process == "iosApp"' 2>/dev/null || true
            echo "--- Crash reports from the last 5 minutes ---"
            find ~/Library/Logs/DiagnosticReports -mmin -5 -print -exec cat {} \; 2>/dev/null || echo "(none found)"
            exit 1
          fi

      - name: Upload launch screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: launch-screenshot
          path: launch-screenshot.png
          if-no-files-found: ignore
